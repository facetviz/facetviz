<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FacetViz Playground</title>
    <style>
      :root {
        --bg: #f5f6fb;
        --panel: #ffffff;
        --border: #e7e8f0;
        --text: #16181d;
        --muted: #6b7280;
        --accent: #6366f1;
        --accent-2: #8b5cf6;
        --accent-fg: #fff;
        --editor-bg: #0d1117;
        --editor-fg: #e6edf7;
        --error: #e5484d;
        --ok: #16a34a;
        --chip: #eef0fe;
        --chip-fg: #4338ca;
        --mono:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0e16;
          --panel: #141926;
          --border: #232a3b;
          --text: #e7ecf6;
          --muted: #97a0b5;
          --chip: #1e2333;
          --chip-fg: #a5b4fc;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 9px 16px;
        background: color-mix(in srgb, var(--panel) 88%, transparent);
        backdrop-filter: saturate(1.4) blur(10px);
        border-bottom: 1px solid var(--border);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
        font-weight: 800;
        font-size: 16px;
        letter-spacing: -0.4px;
        color: var(--text);
        text-decoration: none;
      }
      .brand .mark {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 14px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
      }
      .topnav {
        display: flex;
        gap: 2px;
      }
      .topnav a {
        color: var(--muted);
        font-size: 13.5px;
        font-weight: 600;
        padding: 6px 10px;
        border-radius: 8px;
        text-decoration: none;
      }
      .topnav a:hover {
        color: var(--text);
      }
      .topnav a.active {
        color: var(--chip-fg);
        background: var(--chip);
      }
      header .badge {
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
      }
      header .spacer {
        flex: 1;
      }
      select,
      button {
        font-family: var(--sans);
        font-size: 13px;
        padding: 7px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
      }
      button.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: var(--accent-fg);
        border: 0;
        font-weight: 600;
      }
      button:hover {
        filter: brightness(0.97);
      }
      label.field {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(320px, 42%) 1fr;
        min-height: 0;
      }
      .pane {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .pane.left {
        border-right: 1px solid var(--border);
      }
      .pane-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .status {
        margin-left: auto;
        font-weight: 600;
      }
      .status.ok {
        color: var(--ok);
      }
      .status.err {
        color: var(--error);
      }

      #editor {
        flex: 1;
        width: 100%;
        resize: none;
        border: 0;
        outline: none;
        padding: 14px 16px;
        background: var(--editor-bg);
        color: var(--editor-fg);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.55;
        tab-size: 2;
        white-space: pre;
        overflow: auto;
      }

      .preview-wrap {
        flex: 1;
        overflow: auto;
        padding: 18px;
      }
      #preview {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        min-height: 160px;
        min-width: 160px;
        width: 100%;
        height: 420px;
        max-width: 100%;
        resize: both;
        overflow: hidden;
        /* A visible corner so the native resize handle reads as intentional,
         not stray clipping. */
        box-shadow: inset -14px -14px 0 -12px
          color-mix(in srgb, var(--muted) 30%, transparent);
      }
      #previewSize {
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        font-size: 11px;
      }
      #error {
        display: none;
        margin: 0 18px 14px;
        padding: 10px 14px;
        border-radius: 8px;
        background: color-mix(in srgb, var(--error) 12%, transparent);
        color: var(--error);
        font-family: var(--mono);
        font-size: 12px;
        white-space: pre-wrap;
      }
      #error.show {
        display: block;
      }
      .hint {
        padding: 6px 18px 14px;
        font-size: 11px;
        color: var(--muted);
      }
      kbd {
        font-family: var(--mono);
        background: var(--border);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 11px;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 45% 55%;
        }
        .pane.left {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a class="brand" href="./"><span class="mark">F</span> FacetViz</a>
      <nav class="topnav">
        <a href="./">Guide</a>
        <a href="./examples.html">Examples</a>
        <a href="./api.html">API</a>
        <a href="./theme.html">Theme</a>
        <a href="https://github.com/facetviz/facetviz" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
      </nav>
      <div class="spacer"></div>
      <label class="field"
        >Example
        <select id="preset"></select>
      </label>
      <button id="format" title="Prettify JSON">Format</button>
      <button id="run" class="primary" title="Ctrl/Cmd + Enter">Run ▶</button>
    </header>

    <main>
      <section class="pane left">
        <div class="pane-head">
          <span>config.json</span>
          <span id="status" class="status ok">ready</span>
        </div>
        <textarea id="editor" spellcheck="false" autocomplete="off"></textarea>
        <div class="hint">
          Data-only JSON (no functions). <kbd>Tab</kbd> inserts spaces ·
          <kbd>Ctrl/Cmd</kbd>+<kbd>Enter</kbd> runs.
        </div>
      </section>

      <section class="pane right">
        <div class="pane-head">
          <span>preview</span>
          <span id="previewSize"></span>
          <button
            id="resetSize"
            title="Reset preview size"
            style="margin-left: auto; padding: 4px 9px; font-size: 11px"
          >
            Reset size
          </button>
        </div>
        <div class="preview-wrap">
          <div id="error"></div>
          <div id="preview"></div>
        </div>
      </section>
    </main>

    <script type="module">

      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun"];
      const trellisMonths = ["Jan", "Feb", "Mar", "Apr"];
      function trellisData(valueFn) {
        const out = [];
        for (const region of ["East", "West"])
          for (const cat of ["Tech", "Furniture"])
            for (const x of trellisMonths)
              out.push({ x, region, cat, y: valueFn() });
        return out;
      }
      function trellisBoxData() {
        const out = [];
        for (const region of ["East", "West"])
          for (const cat of ["Tech", "Furniture"])
            for (const x of ["A", "B", "C"]) {
              out.push({
                x,
                region,
                cat,
                min: 2,
                q1: 4 + Math.random() * 2,
                median: 6 + Math.random() * 2,
                q3: 8 + Math.random() * 2,
                max: 12,
              });
            }
        return out;
      }

      // -- Wiring ----------------------------------------------------------------
      const editor = document.getElementById("editor");
      const preview = document.getElementById("preview");
      const errorEl = document.getElementById("error");
      const statusEl = document.getElementById("status");
      const presetSel = document.getElementById("preset");
      const previewSizeEl = document.getElementById("previewSize");
      const resetSizeBtn = document.getElementById("resetSize");

      // Drag the preview's bottom-right corner (native CSS `resize`) to check
      // how the chart behaves as its container shrinks or grows — FacetViz's
      // own ResizeObserver (chart.reflow, on by default) picks up the change
      // and re-renders automatically. This readout just mirrors the size back.
      const sizeObserver = new ResizeObserver((entries) => {
        const { width, height } = entries[0].contentRect;
        previewSizeEl.textContent = `${Math.round(width)} × ${Math.round(height)}`;
      });
      sizeObserver.observe(preview);
      resetSizeBtn.addEventListener("click", () => {
        preview.style.width = "";
        preview.style.height = "";
      });

      for (const name of Object.keys(PRESETS)) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        presetSel.appendChild(opt);
      }

      function setStatus(ok, msg) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (ok ? "ok" : "err");
      }

      function render() {
        let config;
        try {
          config = JSON.parse(editor.value);
        } catch (e) {
          errorEl.textContent = "JSON parse error: " + e.message;
          errorEl.classList.add("show");
          setStatus(false, "invalid JSON");
          return;
        }
        try {
          preview.innerHTML = "";
          new FacetViz(preview, config);
          errorEl.classList.remove("show");
          setStatus(true, "rendered ✓");
        } catch (e) {
          errorEl.textContent =
            "Render error: " + (e && e.message ? e.message : e);
          errorEl.classList.add("show");
          setStatus(false, "render error");
          console.error(e);
        }
      }

      function loadPreset(name) {
        editor.value = JSON.stringify(PRESETS[name], null, 2);
        render();
      }

      // Debounced live update.
      let timer;
      editor.addEventListener("input", () => {
        clearTimeout(timer);
        setStatus(true, "editing…");
        timer = setTimeout(render, 400);
      });

      // Tab inserts two spaces instead of moving focus.
      editor.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const s = editor.selectionStart,
            en = editor.selectionEnd;
          editor.value =
            editor.value.slice(0, s) + "  " + editor.value.slice(en);
          editor.selectionStart = editor.selectionEnd = s + 2;
        } else if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          render();
        }
      });

      document.getElementById("run").addEventListener("click", render);
      document.getElementById("format").addEventListener("click", () => {
        try {
          editor.value = JSON.stringify(JSON.parse(editor.value), null, 2);
          render();
        } catch (e) {
          setStatus(false, "invalid JSON");
        }
      });
      presetSel.addEventListener("change", () => loadPreset(presetSel.value));

      // Re-fit chart on resize.
      let rs;
      window.addEventListener("resize", () => {
        clearTimeout(rs);
        rs = setTimeout(render, 200);
      });

      // Initial load: a config handed over from the Examples page, else preset #1.
      function loadHandoff() {
        try {
          const raw = sessionStorage.getItem("facetviz:playground");
          if (!raw) return false;
          sessionStorage.removeItem("facetviz:playground");
          const { title, cfg } = JSON.parse(raw);
          editor.value = JSON.stringify(cfg, null, 2);
          // Reflect it in the dropdown if it matches a preset name.
          if (title && [...presetSel.options].some((o) => o.value === title))
            presetSel.value = title;
          else presetSel.selectedIndex = -1;
          render();
          return true;
        } catch (e) {
          return false;
        }
      }
      function loadRequestedPreset() {
        const requested = new URLSearchParams(location.search).get("preset");
        if (!requested || !Object.hasOwn(PRESETS, requested)) return false;
        presetSel.value = requested;
        loadPreset(requested);
        return true;
      }
      if (!loadHandoff() && !loadRequestedPreset()) loadPreset(Object.keys(PRESETS)[0]);
