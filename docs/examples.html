<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FacetChart — Examples</title>
  <link rel="stylesheet" href="./lib/hljs-github-dark.css" />
  <link rel="stylesheet" href="./style.css" />
  <script src="./lib/highlight.min.js"></script>
</head>
<body>
  <header class="topbar">
    <button class="btn menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    <a class="brand" href="./"><span class="mark">F</span> FacetChart</a>
    <nav class="topnav">
      <a href="./" data-page="guide">Guide</a>
      <a href="./examples.html" data-page="examples">Examples</a>
      <a href="./api.html" data-page="api">API</a>
    </nav>
    <div class="spacer"></div>
    <a class="btn primary" href="./playground.html">▶ Playground</a>
  </header>

  <div class="layout">
    <aside class="side" id="side">
      <div class="grouplbl">Categories</div>
      <nav id="cat-nav"></nav>
    </aside>
    <main class="content" style="max-width:1120px">
      <h1>Examples</h1>
      <p class="lead">Every chart type and feature, live. Click <em>Show config</em> on any example to reveal its
        options on the right.</p>
      <div id="gallery"></div>
    </main>
  </div>

  <script type="module">
    import { FacetChart, renderChart, pretty, highlight, initChrome, scrollspy } from './site.js';
    import { EXAMPLES, slug } from './examples-data.js';

    const catSlug = (s) => 'cat-' + s.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    const gallery = document.getElementById('gallery');
    const catNav = document.getElementById('cat-nav');
    const cats = [...new Set(EXAMPLES.map((e) => e.cat))];

    for (const cat of cats) {
      const a = document.createElement('a'); a.href = '#' + catSlug(cat); a.textContent = cat; catNav.appendChild(a);
      const h = document.createElement('h2'); h.id = catSlug(cat); h.textContent = cat; gallery.appendChild(h);
      for (const ex of EXAMPLES.filter((e) => e.cat === cat)) {
        const id = slug(ex.title);
        const wrap = document.createElement('section'); wrap.className = 'example panel'; wrap.id = id;
        wrap.innerHTML = `<div class="head">
            <a class="anchor" href="#${id}" title="Link to this example">#</a>
            <h4>${ex.title}</h4><p>${ex.desc}</p><span class="spacer"></span>
            <a class="pg-link" href="./playground.html" title="Open this config in the playground">Playground ↗</a>
          </div>
          <div class="body"><div class="chart"></div>
          <details><summary>Show config</summary><pre><code class="language-js"></code></pre></details></div>`;
        gallery.appendChild(wrap);
        wrap.querySelector('code').textContent = 'new FacetChart(el, ' + pretty(ex.cfg) + ');';
        // Hand THIS config to the playground (via sessionStorage — no giant URLs).
        wrap.querySelector('.pg-link').addEventListener('click', () => {
          try { sessionStorage.setItem('facetchart:playground', JSON.stringify({ title: ex.title, cfg: ex.cfg })); } catch (e) {}
        });
        renderChart(FacetChart, wrap.querySelector('.chart'), ex.cfg);
      }
    }

    // Highlight the targeted example when arriving via #anchor.
    const flash = () => {
      document.querySelectorAll('.example.target').forEach((e) => e.classList.remove('target'));
      if (location.hash) { const el = document.getElementById(location.hash.slice(1)); if (el) { el.classList.add('target'); el.scrollIntoView(); } }
    };
    window.addEventListener('hashchange', flash);

    highlight(document);
    initChrome('examples');
    scrollspy('#side');
    flash();
  </script>
</body>
</html>
