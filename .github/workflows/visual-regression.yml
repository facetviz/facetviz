name: Visual regression

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # This repository intentionally does not commit package-lock.json.
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual:typecheck
      - run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # This repository intentionally does not commit package-lock.json.
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run test:performance:typecheck
      - run: npm run test:bundle-size
      - run: npm run test:performance
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: playwright-performance-report
          retention-days: 14
